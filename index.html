<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        authDomain: "pradeep-cv-1299a.firebaseapp.com",
        databaseURL: "https://pradeep-cv-1299a-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "pradeep-cv-1299a",
        storageBucket: "pradeep-cv-1299a.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let currentUser = null;
    let typingTimeout = null;
    
    // Theme Toggle
    let darkMode = false;
    const themeToggle = document.getElementById('themeToggle');
    if(themeToggle) {
        themeToggle.addEventListener('click', () => {
            darkMode = !darkMode;
            if(darkMode) {
                document.body.setAttribute('data-theme', 'dark');
                themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
            } else {
                document.body.removeAttribute('data-theme');
                themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
            }
        });
    }
    
    // ========== LOAD PUBLIC DATA ==========
    function loadPublicData() {
        database.ref('public_data').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            const nameEl = document.getElementById('aboutName');
            const descEl = document.getElementById('aboutDesc');
            const phoneEl = document.getElementById('contactPhone');
            const emailEl = document.getElementById('contactEmail');
            const locationEl = document.getElementById('contactLocation');
            
            if(nameEl) nameEl.innerText = data.fullName || 'Pradeep Kumar';
            if(descEl) descEl.innerText = data.about || 'Experienced Accountant and Legal Expert with 7+ years of expertise...';
            if(phoneEl) phoneEl.innerText = data.phone || '8955152133 | 8502000060';
            if(emailEl) emailEl.innerText = data.email || 'pradeep.jat1996@gmail.com';
            if(locationEl) locationEl.innerText = data.location || 'Sikar, Rajasthan';
            
            if(data.linkedin) {
                const linkedinBtns = document.querySelectorAll('#linkedinBtn, #linkedinContactLink');
                linkedinBtns.forEach(btn => { if(btn) btn.href = data.linkedin; });
            }
            
            if(data.photoUrl && document.getElementById('aboutImg')) {
                document.getElementById('aboutImg').innerHTML = `<img src="${data.photoUrl}" alt="Profile">`;
            }
            
            if(data.stats) {
                const stat1 = document.getElementById('stat1');
                const stat2 = document.getElementById('stat2');
                const stat3 = document.getElementById('stat3');
                if(stat1) stat1.innerText = data.stats.exp || '7+';
                if(stat2) stat2.innerText = data.stats.clients || '500+';
                if(stat3) stat3.innerText = data.stats.success || '100%';
            }
            
            // Services
            const services = data.services || [
                { icon: "fa-chart-line", title: "Accounting", desc: "Complete accounting solutions including Tally, GST, TDS" },
                { icon: "fa-gavel", title: "Legal Services", desc: "Legal notice drafting, compliance, documentation" },
                { icon: "fa-file-invoice", title: "Taxation", desc: "GST filing, Income Tax, TDS returns" },
                { icon: "fa-briefcase", title: "Business Consulting", desc: "Financial planning and business advisory" }
            ];
            const servicesGrid = document.getElementById('servicesGrid');
            if(servicesGrid) {
                servicesGrid.innerHTML = services.map(s => `
                    <div class="service-card">
                        <i class="fas ${s.icon}"></i>
                        <h3>${escapeHtml(s.title)}</h3>
                        <p>${escapeHtml(s.desc)}</p>
                    </div>
                `).join('');
            }
            
            // Experience
            const experiences = data.experiences || [
                { year: "2021-2026", title: "Senior Accountant & Legal Executive", company: "Matrix Education, Sikar", desc: "Managed Tally Prime, GST, TDS, and legal notice drafting." }
            ];
            const timeline = document.getElementById('timeline');
            if(timeline) {
                timeline.innerHTML = experiences.map(exp => `
                    <div class="timeline-item">
                        <div class="timeline-year">${escapeHtml(exp.year)}</div>
                        <h3>${escapeHtml(exp.title)}</h3>
                        <p><strong>${escapeHtml(exp.company)}</strong></p>
                        <p>${escapeHtml(exp.desc)}</p>
                    </div>
                `).join('');
            }
            
            // Skills
            const skills = data.skills || ['Tally Prime', 'GST Filing', 'TDS Compliance', 'PF & ESIC', 'Legal Drafting', 'MS Excel', 'Income Tax', 'Company Law', 'Bank Reconciliation'];
            const skillsContainer = document.getElementById('skillsContainer');
            if(skillsContainer) {
                skillsContainer.innerHTML = skills.map(s => `<span class="skill-tag">${escapeHtml(s)}</span>`).join('');
            }
            
            // Reviews
            const reviews = data.reviews || [
                { name: "Radheshyam Saini", text: "Very nice behavior and complete accounting solution" },
                { name: "Neha Gupta", text: "Excellent GST filing service. Highly professional!" }
            ];
            const reviewsGrid = document.getElementById('reviewsGrid');
            if(reviewsGrid) {
                reviewsGrid.innerHTML = reviews.map(r => `
                    <div class="review-card">
                        <i class="fas fa-quote-left"></i>
                        <p>${escapeHtml(r.text)}</p>
                        <p class="reviewer">- ${escapeHtml(r.name)}</p>
                    </div>
                `).join('');
            }
        });
    }
    
    // ========== CHAT SYSTEM - USER SIDE ==========
    
    // Check if user already logged in
    function checkExistingUser() {
        const savedUser = localStorage.getItem('chat_user');
        if(savedUser) {
            try {
                currentUser = JSON.parse(savedUser);
                // Verify user exists in Firebase
                database.ref('chat_users/' + currentUser.id).once('value', (snapshot) => {
                    if(snapshot.exists()) {
                        showChatInterface();
                        loadUserMessages();
                        setupTyping();
                    } else {
                        localStorage.removeItem('chat_user');
                        currentUser = null;
                    }
                });
            } catch(e) {
                localStorage.removeItem('chat_user');
            }
        }
    }
    
    // Register new user
    window.registerUser = function() {
        const name = document.getElementById('chatName').value.trim();
        const email = document.getElementById('chatEmail').value.trim();
        
        if(!name) {
            alert('❌ Please enter your name');
            return;
        }
        if(!email || !email.includes('@')) {
            alert('❌ Please enter valid email');
            return;
        }
        
        const userId = 'user_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
        const userData = {
            id: userId,
            name: name,
            email: email,
            registeredAt: Date.now(),
            lastActive: Date.now()
        };
        
        database.ref('chat_users/' + userId).set(userData).then(() => {
            currentUser = userData;
            localStorage.setItem('chat_user', JSON.stringify(userData));
            
            // Send welcome message
            database.ref('chats').push({
                userId: userId,
                userName: name,
                userEmail: email,
                message: `👋 Hello! I'm ${name}. I need your professional services.`,
                timestamp: Date.now(),
                read: false,
                isAdmin: false,
                conversationId: userId
            });
            
            showChatInterface();
            loadUserMessages();
            setupTyping();
            
            document.getElementById('chatName').value = '';
            document.getElementById('chatEmail').value = '';
        }).catch(err => {
            console.error(err);
            alert('Registration failed. Please try again.');
        });
    };
    
    // Show chat interface after login
    function showChatInterface() {
        const loginDiv = document.getElementById('chatLogin');
        const chatDiv = document.getElementById('chatArea');
        const userNameSpan = document.getElementById('chatUserName');
        
        if(loginDiv) loginDiv.style.display = 'none';
        if(chatDiv) chatDiv.style.display = 'block';
        if(userNameSpan && currentUser) userNameSpan.innerText = currentUser.name;
    }
    
    // Load only CURRENT USER's messages (not others)
    function loadUserMessages() {
        if(!currentUser) return;
        
        const messagesRef = database.ref('chats').orderByChild('timestamp').limitToLast(100);
        
        messagesRef.on('value', (snapshot) => {
            const allMessages = [];
            snapshot.forEach(child => {
                const msg = child.val();
                allMessages.push({ id: child.key, ...msg });
            });
            
            // FILTER: Sirf current user ke messages dikhao
            const userMessages = allMessages.filter(msg => 
                msg.userId === currentUser.id || 
                (msg.userId === 'admin' && msg.conversationId === currentUser.id)
            );
            
            // Also include messages where conversationId matches
            const relevantMessages = allMessages.filter(msg => 
                msg.userId === currentUser.id || 
                msg.conversationId === currentUser.id ||
                (msg.userId === 'admin' && msg.userEmail === currentUser.email)
            );
            
            const finalMessages = [...new Map([...userMessages, ...relevantMessages].map(m => [m.id, m])).values()];
            finalMessages.sort((a, b) => a.timestamp - b.timestamp);
            
            const messagesDiv = document.getElementById('messagesList');
            if(!messagesDiv) return;
            
            if(finalMessages.length === 0) {
                messagesDiv.innerHTML = '<div style="text-align: center; color: #999; padding: 30px;">✨ Start a conversation! Send a message below.</div>';
                return;
            }
            
            messagesDiv.innerHTML = finalMessages.map(msg => {
                const isUser = msg.userId === currentUser.id;
                return `
                    <div class="chat-message ${isUser ? 'user-msg' : 'admin-msg'}" style="margin-bottom: 15px; display: flex; justify-content: ${isUser ? 'flex-end' : 'flex-start'};">
                        <div style="max-width: 80%; ${isUser ? 'background: #D4AF37; color: #0a0a0a;' : 'background: #1a1a1a; color: #D4AF37;'} padding: 12px 16px; border-radius: 18px; ${isUser ? 'border-bottom-right-radius: 5px;' : 'border-bottom-left-radius: 5px;'}">
                            <div style="font-size: 11px; opacity: 0.7; margin-bottom: 4px;">
                                ${isUser ? 'You' : 'Pradeep Kumar (Admin)'}
                            </div>
                            <div style="word-wrap: break-word; white-space: pre-wrap;">${formatMessage(msg.message)}</div>
                            <div style="font-size: 9px; opacity: 0.5; margin-top: 5px;">
                                ${new Date(msg.timestamp).toLocaleString()}
                                ${msg.read ? ' ✓✓' : ' ✓'}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            // Scroll to bottom
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            // Mark messages as read
            finalMessages.forEach(msg => {
                if(msg.userId !== currentUser.id && !msg.read) {
                    database.ref('chats/' + msg.id).update({ read: true, readAt: Date.now() });
                }
            });
        });
    }
    
    // Format message (support emoji and line breaks)
    function formatMessage(text) {
        if(!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/\n/g, '<br>')
            .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
            .replace(/__(.*?)__/g, '<em>$1</em>');
    }
    
    // Setup typing indicator
    function setupTyping() {
        if(!currentUser) return;
        
        const typingRef = database.ref('typing_status/' + currentUser.id);
        const adminTypingRef = database.ref('typing_status/admin_' + currentUser.id);
        
        adminTypingRef.on('value', (snapshot) => {
            const isTyping = snapshot.val();
            const indicator = document.getElementById('adminTyping');
            if(indicator) {
                if(isTyping) {
                    indicator.style.display = 'block';
                } else {
                    indicator.style.display = 'none';
                }
            }
        });
        
        const input = document.getElementById('chatMessageInput');
        if(input) {
            input.addEventListener('input', () => {
                typingRef.set(true);
                if(typingTimeout) clearTimeout(typingTimeout);
                typingTimeout = setTimeout(() => {
                    typingRef.set(false);
                }, 1000);
            });
        }
    }
    
    // Send message
    window.sendUserMessage = function() {
        if(!currentUser) {
            alert('Please login first');
            return;
        }
        
        const input = document.getElementById('chatMessageInput');
        const message = input.value.trim();
        
        if(!message) {
            alert('Please type a message');
            return;
        }
        
        const sendBtn = document.getElementById('sendMsgBtn');
        if(sendBtn) sendBtn.disabled = true;
        
        database.ref('chats').push({
            userId: currentUser.id,
            userName: currentUser.name,
            userEmail: currentUser.email,
            message: message,
            timestamp: Date.now(),
            read: false,
            isAdmin: false,
            conversationId: currentUser.id
        }).then(() => {
            input.value = '';
            database.ref('typing_status/' + currentUser.id).set(false);
        }).catch(err => {
            console.error(err);
            alert('Failed to send message');
        }).finally(() => {
            if(sendBtn) sendBtn.disabled = false;
        });
    };
    
    // Logout
    window.logoutUser = function() {
        if(currentUser) {
            database.ref('typing_status/' + currentUser.id).set(false);
        }
        currentUser = null;
        localStorage.removeItem('chat_user');
        
        database.ref('chats').off();
        database.ref('typing_status').off();
        
        const loginDiv = document.getElementById('chatLogin');
        const chatDiv = document.getElementById('chatArea');
        
        if(loginDiv) loginDiv.style.display = 'block';
        if(chatDiv) chatDiv.style.display = 'none';
    };
    
    // PDF Download
    const downloadBtn = document.getElementById('downloadCvBtn');
    if(downloadBtn) {
        downloadBtn.addEventListener('click', () => {
            const name = document.getElementById('aboutName')?.innerText || 'Pradeep Kumar';
            const about = document.getElementById('aboutDesc')?.innerText || '';
            const skills = document.getElementById('skillsContainer')?.innerHTML || '';
            const experience = document.getElementById('timeline')?.innerHTML || '';
            const phone = document.getElementById('contactPhone')?.innerText || '';
            const email = document.getElementById('contactEmail')?.innerText || '';
            
            const element = document.createElement('div');
            element.style.padding = '40px';
            element.style.fontFamily = 'Inter, sans-serif';
            element.style.maxWidth = '800px';
            element.style.margin = '0 auto';
            element.innerHTML = `
                <div style="text-align:center; border-bottom:2px solid #D4AF37; padding-bottom:20px;">
                    <h1>${escapeHtml(name)}</h1>
                    <p style="color:#D4AF37;">Accountant & Legal Expert</p>
                </div>
                <div style="margin:20px 0;"><h3>Professional Summary</h3><p>${escapeHtml(about)}</p></div>
                <div style="margin:20px 0;"><h3>Skills</h3><div>${skills}</div></div>
                <div style="margin:20px 0;"><h3>Experience</h3>${experience}</div>
                <div><h3>Contact</h3><p>${escapeHtml(phone)}</p><p>${escapeHtml(email)}</p></div>
            `;
            html2pdf().set({ margin: 0.5, filename: `${name.replace(/\s/g, '_')}_CV.pdf`, jsPDF: { format: 'a4' } }).from(element).save();
        });
    }
    
    // Modal functions
    window.submitCvRequest = function() {
        const name = document.getElementById('cvName')?.value;
        const email = document.getElementById('cvEmail')?.value;
        const phone = document.getElementById('cvPhone')?.value;
        const skills = document.getElementById('cvSkills')?.value;
        
        if(!name || !email) {
            alert('Please fill name and email');
            return;
        }
        
        database.ref('cv_requests').push({
            name: name,
            email: email,
            phone: phone || '',
            skills: skills || '',
            timestamp: Date.now()
        });
        alert('✅ CV request submitted! We will email you the template within 24 hours.');
        closeModal();
    };
    
    window.closeModal = function() {
        const modal = document.getElementById('createCvModal');
        if(modal) modal.style.display = 'none';
    };
    
    // Tab switching
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                const activeTab = document.getElementById(tabId);
                if(activeTab) activeTab.classList.add('active');
            });
        });
    }
    
    // Enter key to send
    document.addEventListener('keypress', function(e) {
        if(e.key === 'Enter' && document.getElementById('chatMessageInput') === document.activeElement) {
            sendUserMessage();
        }
    });
    
    // Escape HTML helper
    function escapeHtml(text) {
        if(!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if(m === '&') return '&amp;';
            if(m === '<') return '&lt;';
            if(m === '>') return '&gt;';
            return m;
        });
    }
    
    // Initialize
    loadPublicData();
    checkExistingUser();
    setTimeout(initTabs, 500);
    
    // Views counter
    const viewsRef = database.ref('cv_views');
    viewsRef.on('value', (snapshot) => {
        const viewSpan = document.getElementById('viewCount');
        if(viewSpan) viewSpan.innerText = snapshot.val() || 0;
    });
    viewsRef.transaction(v => (v || 0) + 1);
    
    // Make functions global
    window.registerUser = registerUser;
    window.sendUserMessage = sendUserMessage;
    window.logoutUser = logoutUser;
</script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pradeep Kumar | Professional CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2b3d 0%, #1a4a6f 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        /* Admin Toggle Button */
        .admin-toggle {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #0f2b3d;
            color: #eab308;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            z-index: 1000;
            font-size: 22px;
            transition: all 0.3s;
        }

        .admin-toggle:hover {
            background: #eab308;
            color: #0f2b3d;
            transform: scale(1.1);
        }

        /* Admin Panel Styles (Hidden by default) */
        .admin-panel {
            display: none;
            background: #1e293b;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 30px;
            color: white;
        }

        .admin-panel.show {
            display: block;
            animation: slideDown 0.4s ease;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .admin-panel h3 {
            color: #eab308;
            margin-bottom: 20px;
        }

        .admin-panel input, .admin-panel textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: none;
            font-family: inherit;
        }

        .admin-panel textarea {
            min-height: 80px;
        }

        .admin-panel button {
            background: #eab308;
            color: #0f2b3d;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }

        .admin-panel .danger-btn {
            background: #dc2626;
            color: white;
        }

        .exp-item, .edu-item {
            background: #334155;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 15px;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 30px;
        }

        .views-counter {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            color: #eab308;
            font-weight: 600;
        }

        .print-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            padding: 10px 20px;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            font-weight: 600;
        }

        /* Tabs */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
            background: rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 60px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            padding: 12px 28px;
            border: none;
            background: transparent;
            color: white;
            font-weight: 600;
            cursor: pointer;
            border-radius: 40px;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #eab308;
            color: #0f2b3d;
        }

        /* Profile Header */
        .profile-header {
            background: white;
            border-radius: 30px;
            padding: 40px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            position: relative;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            background: linear-gradient(135deg, #0f2b3d, #1a4a6f);
            border-radius: 50%;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
            color: #eab308;
            border: 4px solid #eab308;
        }

        .profile-header h1 {
            font-size: 2.5rem;
            color: #0f2b3d;
        }

        .status-badge {
            display: inline-block;
            background: #dcfce7;
            color: #15803d;
            padding: 5px 15px;
            border-radius: 30px;
            margin-top: 15px;
            font-size: 14px;
        }

        /* Stats Grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .stat-card i {
            font-size: 30px;
            color: #eab308;
        }

        .stat-number {
            font-size: 28px;
            font-weight: 800;
            color: #0f2b3d;
        }

        /* Content Cards */
        .tab-content {
            display: none;
            background: white;
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-title {
            font-size: 1.5rem;
            color: #0f2b3d;
            margin-bottom: 20px;
            border-left: 4px solid #eab308;
            padding-left: 15px;
        }

        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        .info-row {
            display: flex;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }

        .info-label {
            width: 130px;
            font-weight: 700;
            color: #0f2b3d;
        }

        .skill-tag {
            display: inline-block;
            background: #f1f5f9;
            padding: 8px 16px;
            border-radius: 12px;
            margin: 5px;
            font-size: 13px;
            font-weight: 600;
            color: #0f2b3d;
        }

        .timeline-item {
            margin-bottom: 25px;
            padding-left: 20px;
            border-left: 2px solid #eab308;
        }

        .timeline-year {
            font-weight: 800;
            color: #eab308;
            font-size: 14px;
        }

        .timeline-title {
            font-weight: 700;
            font-size: 18px;
            color: #0f2b3d;
        }

        .edit-hint {
            font-size: 11px;
            color: #eab308;
            margin-top: 5px;
        }

        footer {
            text-align: center;
            color: rgba(255,255,255,0.5);
            margin-top: 40px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .tabs { border-radius: 20px; justify-content: center; }
            .tab-btn { padding: 8px 16px; font-size: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Top Bar -->
    <div class="top-bar">
        <div class="views-counter">
            <i class="fa-regular fa-eye"></i> Views: <span id="viewCount">0</span>
        </div>
        <button class="print-btn" onclick="window.print()">
            <i class="fa-solid fa-print"></i> Print / PDF
        </button>
    </div>

    <!-- Admin Panel (Hidden by default) -->
    <div class="admin-panel" id="adminPanel">
        <h3><i class="fa-solid fa-lock"></i> Admin Control Panel</h3>
        
        <div class="edit-hint" id="saveMsg" style="color:#4ade80; margin-bottom:15px;"></div>
        
        <h4>Basic Info</h4>
        <input type="text" id="editName" placeholder="Full Name">
        <input type="text" id="editDesignation" placeholder="Designation">
        <input type="text" id="editStatus" placeholder="Status Badge">
        <textarea id="editAbout" placeholder="About Me"></textarea>
        
        <h4>Contact Details</h4>
        <input type="text" id="editPhone" placeholder="Phone">
        <input type="email" id="editEmail" placeholder="Email">
        <input type="text" id="editLocation" placeholder="Location">
        <input type="text" id="editBirthday" placeholder="Birthday">
        
        <h4>Skills (comma separated)</h4>
        <input type="text" id="editSkills" placeholder="Tally, GST, TDS, Legal Drafting">
        
        <h4>Experience</h4>
        <div id="expAdminList"></div>
        <button onclick="addExpField()">+ Add Experience</button>
        
        <h4>Education</h4>
        <div id="eduAdminList"></div>
        <button onclick="addEduField()">+ Add Education</button>
        
        <div style="margin-top: 20px;">
            <button id="saveAllBtn"><i class="fa-regular fa-floppy-disk"></i> Save All Changes</button>
            <button id="closeAdminBtn" class="danger-btn">Close Panel</button>
            <button id="logoutAdminBtn" class="danger-btn">Logout</button>
        </div>
    </div>

    <!-- Tabs Navigation -->
    <div class="tabs">
        <button class="tab-btn active" data-tab="tab-about"><i class="fa-regular fa-user"></i> About</button>
        <button class="tab-btn" data-tab="tab-experience"><i class="fa-regular fa-building"></i> Experience</button>
        <button class="tab-btn" data-tab="tab-education"><i class="fa-regular fa-graduation-cap"></i> Education</button>
        <button class="tab-btn" data-tab="tab-skills"><i class="fa-regular fa-code"></i> Skills</button>
        <button class="tab-btn" data-tab="tab-contact"><i class="fa-regular fa-address-card"></i> Contact</button>
    </div>

    <!-- Profile Header (Dynamic) -->
    <div class="profile-header" id="profileHeader">
        <div class="profile-img">
            <i class="fa-regular fa-user"></i>
        </div>
        <h1 id="fullName">Pradeep Kumar</h1>
        <p id="designation">Accountant & Legal Expert</p>
        <span class="status-badge" id="statusBadge">7+ Years Experience | Immediate Joining</span>
    </div>

    <!-- Stats Grid (Dynamic) -->
    <div class="stats-grid" id="statsGrid"></div>

    <!-- Tab Contents (Dynamic) -->
    <div id="tab-contents"></div>

    <footer>
        © 2026 Pradeep Kumar | Professional Digital CV
    </footer>
</div>

<!-- Admin Toggle Button -->
<div class="admin-toggle" id="adminToggleBtn">
    <i class="fa-solid fa-user-lock"></i>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    // Firebase Config
    const firebaseConfig = {
        authDomain: "pradeep-cv-1299a.firebaseapp.com",
        databaseURL: "https://pradeep-cv-1299a-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "pradeep-cv-1299a",
        storageBucket: "pradeep-cv-1299a.appspot.com"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    // Admin Session
    let isAdmin = localStorage.getItem('cv_admin') === 'true';
    let experiences = [];
    let educations = [];
    
    // Toggle Admin Panel
    document.getElementById('adminToggleBtn').addEventListener('click', () => {
        if (!isAdmin) {
            const pwd = prompt('🔐 Enter Admin Password:');
            if (pwd === 'admin123') {
                localStorage.setItem('cv_admin', 'true');
                isAdmin = true;
                document.getElementById('adminPanel').classList.add('show');
                loadAdminData();
            } else {
                alert('Wrong Password!');
            }
        } else {
            document.getElementById('adminPanel').classList.toggle('show');
            if (document.getElementById('adminPanel').classList.contains('show')) {
                loadAdminData();
            }
        }
    });
    
    document.getElementById('closeAdminBtn').addEventListener('click', () => {
        document.getElementById('adminPanel').classList.remove('show');
    });
    
    document.getElementById('logoutAdminBtn').addEventListener('click', () => {
        localStorage.removeItem('cv_admin');
        isAdmin = false;
        document.getElementById('adminPanel').classList.remove('show');
        alert('Logged out from admin mode!');
    });
    
    // Load data into admin form
    function loadAdminData() {
        database.ref('cv_data').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('editName').value = data.fullName || '';
            document.getElementById('editDesignation').value = data.designation || '';
            document.getElementById('editStatus').value = data.statusBadge || '';
            document.getElementById('editAbout').value = data.about || '';
            document.getElementById('editPhone').value = data.phone || '';
            document.getElementById('editEmail').value = data.email || '';
            document.getElementById('editLocation').value = data.location || '';
            document.getElementById('editBirthday').value = data.birthday || '';
            document.getElementById('editSkills').value = (data.skills || []).join(', ');
            
            experiences = data.experiences || [];
            educations = data.educations || [];
            
            renderAdminExp();
            renderAdminEdu();
        });
    }
    
    function renderAdminExp() {
        const container = document.getElementById('expAdminList');
        container.innerHTML = experiences.map((exp, i) => `
            <div class="exp-item">
                <input type="text" placeholder="Year (2021-2026)" value="${exp.year}" onchange="updateExp(${i}, 'year', this.value)">
                <input type="text" placeholder="Title" value="${exp.title}" onchange="updateExp(${i}, 'title', this.value)" style="margin-top:8px;">
                <input type="text" placeholder="Company" value="${exp.company}" onchange="updateExp(${i}, 'company', this.value)" style="margin-top:8px;">
                <textarea placeholder="Description" onchange="updateExp(${i}, 'desc', this.value)" style="margin-top:8px;">${exp.desc}</textarea>
                <button onclick="removeExp(${i})" style="background:#dc2626; color:white; margin-top:8px;">Remove</button>
            </div>
        `).join('');
    }
    
    function renderAdminEdu() {
        const container = document.getElementById('eduAdminList');
        container.innerHTML = educations.map((edu, i) => `
            <div class="edu-item">
                <input type="text" placeholder="Year" value="${edu.year}" onchange="updateEdu(${i}, 'year', this.value)">
                <input type="text" placeholder="Title" value="${edu.title}" onchange="updateEdu(${i}, 'title', this.value)" style="margin-top:8px;">
                <input type="text" placeholder="Percentage/Grade" value="${edu.percent}" onchange="updateEdu(${i}, 'percent', this.value)" style="margin-top:8px;">
                <button onclick="removeEdu(${i})" style="background:#dc2626; color:white; margin-top:8px;">Remove</button>
            </div>
        `).join('');
    }
    
    function updateExp(index, field, value) {
        experiences[index][field] = value;
    }
    
    function updateEdu(index, field, value) {
        educations[index][field] = value;
    }
    
    function addExpField() {
        experiences.push({ year: '2024', title: 'New Position', company: 'Company Name', desc: 'Description here' });
        renderAdminExp();
    }
    
    function addEduField() {
        educations.push({ year: '2024', title: 'New Degree', percent: 'Pending' });
        renderAdminEdu();
    }
    
    function removeExp(index) {
        experiences.splice(index, 1);
        renderAdminExp();
    }
    
    function removeEdu(index) {
        educations.splice(index, 1);
        renderAdminEdu();
    }
    
    // Save all data
    document.getElementById('saveAllBtn').addEventListener('click', async () => {
        const skillsArray = document.getElementById('editSkills').value.split(',').map(s => s.trim());
        
        const data = {
            fullName: document.getElementById('editName').value,
            designation: document.getElementById('editDesignation').value,
            statusBadge: document.getElementById('editStatus').value,
            about: document.getElementById('editAbout').value,
            phone: document.getElementById('editPhone').value,
            email: document.getElementById('editEmail').value,
            location: document.getElementById('editLocation').value,
            birthday: document.getElementById('editBirthday').value,
            skills: skillsArray,
            experiences: experiences,
            educations: educations
        };
        
        await database.ref('cv_data').set(data);
        document.getElementById('saveMsg').innerHTML = '✅ Saved successfully! Refreshing...';
        setTimeout(() => {
            document.getElementById('saveMsg').innerHTML = '';
            loadPublicData(); // Refresh public view
        }, 1000);
    });
    
    // Load data for Public View
    function loadPublicData() {
        database.ref('cv_data').on('value', (snapshot) => {
            const data = snapshot.val() || {};
            
            document.getElementById('fullName').innerText = data.fullName || 'Pradeep Kumar';
            document.getElementById('designation').innerText = data.designation || 'Accountant & Legal Expert';
            document.getElementById('statusBadge').innerHTML = data.statusBadge || '7+ Years Experience | Immediate Joining';
            
            const stats = data.stats || [
                { icon: "briefcase", value: "7+ Years", label: "Experience" },
                { icon: "scale-balanced", value: "LLB", label: "Legal Expert" },
                { icon: "money-bill-transfer", value: "500+", label: "BRS / Month" },
                { icon: "shield-halved", value: "100%", label: "Compliance" }
            ];
            
            document.getElementById('statsGrid').innerHTML = stats.map(stat => `
                <div class="stat-card">
                    <i class="fa-solid fa-${stat.icon}"></i>
                    <div class="stat-number">${stat.value}</div>
                    <div style="font-size:12px; color:#64748b;">${stat.label}</div>
                </div>
            `).join('');
            
            buildPublicTabs(data);
        });
    }
    
    function buildPublicTabs(data) {
        const tabsHtml = `
            <div class="tab-content" id="tab-about">
                <h2 class="section-title"><i class="fa-regular fa-user"></i> About Me</h2>
                <p style="line-height:1.8;">${data.about || 'Experienced Accountant and Legal Expert with 7+ years of expertise in financial management, compliance, and legal documentation.'}</p>
            </div>
            
            <div class="tab-content" id="tab-experience">
                <h2 class="section-title"><i class="fa-regular fa-building"></i> Work Experience</h2>
                <div id="expListPublic"></div>
            </div>
            
            <div class="tab-content" id="tab-education">
                <h2 class="section-title"><i class="fa-regular fa-graduation-cap"></i> Education</h2>
                <div id="eduListPublic"></div>
            </div>
            
            <div class="tab-content" id="tab-skills">
                <h2 class="section-title"><i class="fa-regular fa-code"></i> Skills</h2>
                <div id="skillsListPublic"></div>
            </div>
            
            <div class="tab-content" id="tab-contact">
                <h2 class="section-title"><i class="fa-regular fa-address-card"></i> Contact Information</h2>
                <div class="info-row"><div class="info-label">📞 Phone:</div><div>${data.phone || '8955152133 | 8502000060'}</div></div>
                <div class="info-row"><div class="info-label">✉️ Email:</div><div>${data.email || 'pradeep.jat1996@gmail.com'}</div></div>
                <div class="info-row"><div class="info-label">📍 Location:</div><div>${data.location || 'Sikar, Rajasthan'}</div></div>
                <div class="info-row"><div class="info-label">🎂 Birthday:</div><div>${data.birthday || '27 Feb 1996'}</div></div>
            </div>
        `;
        
        document.getElementById('tab-contents').innerHTML = tabsHtml;
        
        const experiences = data.experiences || [{ year: "2021-2026", title: "Senior Accountant & Legal Executive", company: "Matrix Education, Sikar", desc: "Managed Tally Prime, GST, TDS, and legal notice drafting." }];
        document.getElementById('expListPublic').innerHTML = experiences.map(exp => `
            <div class="timeline-item">
                <div class="timeline-year">${exp.year}</div>
                <div class="timeline-title">${exp.title}</div>
                <div style="color:#64748b;">${exp.company}</div>
                <p style="margin-top:8px;">${exp.desc}</p>
            </div>
        `).join('');
        
        const educations = data.educations || [
            { year: "2021-2023", title: "M.Com", percent: "59.67%" },
            { year: "2017-2020", title: "LLB", percent: "54.5%" },
            { year: "2013-2016", title: "B.Com", percent: "Completed" }
        ];
        document.getElementById('eduListPublic').innerHTML = educations.map(edu => `
            <div class="timeline-item">
                <div class="timeline-year">${edu.year}</div>
                <div class="timeline-title">${edu.title}</div>
                <div>${edu.percent}</div>
            </div>
        `).join('');
        
        const skills = data.skills || ['Tally Prime', 'GST Filing', 'TDS Compliance', 'PF & ESIC', 'Legal Drafting', 'MS Excel'];
        document.getElementById('skillsListPublic').innerHTML = `<div>${skills.map(s => `<span class="skill-tag">${s}</span>`).join('')}</div>`;
        
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        if(document.getElementById('tab-about')) document.getElementById('tab-about').classList.add('active');
    }
    
    // Views Counter
    const viewsRef = database.ref('cv_views');
    viewsRef.on('value', (snapshot) => {
        document.getElementById('viewCount').innerText = snapshot.val() || 0;
    });
    viewsRef.transaction(v => (v || 0) + 1);
    
    // Tab switching
    function initTabs() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const tabId = btn.dataset.tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
                document.getElementById(tabId).classList.add('active');
            });
        });
    }
    
    // Make functions global for admin
    window.updateExp = updateExp;
    window.updateEdu = updateEdu;
    window.addExpField = addExpField;
    window.addEduField = addEduField;
    window.removeExp = removeExp;
    window.removeEdu = removeEdu;
    
    loadPublicData();
    setTimeout(initTabs, 500);
</script>
</body>
</html>

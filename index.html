<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Pradeep CV</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: #0f172a;
            padding: 40px 20px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .admin-header {
            background: #1e293b;
            color: white;
            padding: 20px 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        .card h2 {
            color: #0f2b3d;
            margin-bottom: 20px;
            border-left: 4px solid #eab308;
            padding-left: 15px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: #334155;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-family: inherit;
        }
        textarea {
            min-height: 100px;
        }
        button {
            background: #0f2b3d;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            margin-right: 10px;
        }
        button:hover {
            background: #eab308;
            color: #0f2b3d;
        }
        .btn-danger {
            background: #dc2626;
        }
        .preview-link {
            background: #eab308;
            color: #0f2b3d;
            padding: 10px 20px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
        }
        .success-msg {
            background: #dcfce7;
            color: #15803d;
            padding: 10px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="admin-header">
        <h1><i class="fa-solid fa-lock"></i> Admin Panel</h1>
        <div>
            <a href="index.html" class="preview-link" target="_blank">👁️ View Public CV</a>
            <button id="logoutBtn" style="background:#dc2626; margin-left:10px;">🚪 Logout</button>
        </div>
    </div>
    
    <div id="successMsg" class="success-msg">✅ Data updated successfully!</div>
    
    <form id="editForm">
        <!-- Basic Info -->
        <div class="card">
            <h2><i class="fa-regular fa-user"></i> Basic Information</h2>
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="fullName" name="fullName">
            </div>
            <div class="form-group">
                <label>Designation</label>
                <input type="text" id="designation" name="designation">
            </div>
            <div class="form-group">
                <label>Status Badge</label>
                <input type="text" id="statusBadge" name="statusBadge">
            </div>
            <div class="form-group">
                <label>About Me</label>
                <textarea id="about" name="about"></textarea>
            </div>
        </div>
        
        <!-- Contact -->
        <div class="card">
            <h2><i class="fa-regular fa-address-card"></i> Contact Details</h2>
            <div class="form-group">
                <label>Phone</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" name="email">
            </div>
            <div class="form-group">
                <label>Location</label>
                <input type="text" id="location" name="location">
            </div>
            <div class="form-group">
                <label>Birthday</label>
                <input type="text" id="birthday" name="birthday">
            </div>
        </div>
        
        <!-- Experience -->
        <div class="card">
            <h2><i class="fa-regular fa-building"></i> Experience</h2>
            <div id="expContainer"></div>
            <button type="button" onclick="addExperience()">+ Add Experience</button>
        </div>
        
        <!-- Education -->
        <div class="card">
            <h2><i class="fa-regular fa-graduation-cap"></i> Education</h2>
            <div id="eduContainer"></div>
            <button type="button" onclick="addEducation()">+ Add Education</button>
        </div>
        
        <!-- Skills -->
        <div class="card">
            <h2><i class="fa-regular fa-code"></i> Skills</h2>
            <div class="form-group">
                <label>Skills (comma separated)</label>
                <input type="text" id="skills" placeholder="Tally, GST, TDS, Legal Drafting">
            </div>
        </div>
        
        <div class="card">
            <button type="submit"><i class="fa-regular fa-floppy-disk"></i> Save All Changes</button>
            <button type="button" id="resetBtn">↺ Reset</button>
        </div>
    </form>
</div>

<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        authDomain: "pradeep-cv-1299a.firebaseapp.com",
        databaseURL: "https://pradeep-cv-1299a-default-rtdb.asia-southeast1.firebasedatabase.app/",
        projectId: "pradeep-cv-1299a",
        storageBucket: "pradeep-cv-1299a.appspot.com"
    };
    
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    
    let experiences = [];
    let educations = [];
    
    // Check admin access
    if (localStorage.getItem('cv_admin') !== 'true') {
        alert('Access Denied! Redirecting to public page.');
        window.location.href = 'index.html';
    }
    
    function loadData() {
        database.ref('cv_data').once('value', (snapshot) => {
            const data = snapshot.val() || {};
            document.getElementById('fullName').value = data.fullName || '';
            document.getElementById('designation').value = data.designation || '';
            document.getElementById('statusBadge').value = data.statusBadge || '';
            document.getElementById('about').value = data.about || '';
            document.getElementById('phone').value = data.phone || '';
            document.getElementById('email').value = data.email || '';
            document.getElementById('location').value = data.location || '';
            document.getElementById('birthday').value = data.birthday || '';
            document.getElementById('skills').value = (data.skills || []).join(', ');
            
            experiences = data.experiences || [];
            educations = data.educations || [];
            
            renderExperiences();
            renderEducations();
        });
    }
    
    function renderExperiences() {
        const container = document.getElementById('expContainer');
        container.innerHTML = experiences.map((exp, i) => `
            <div style="border:1px solid #e2e8f0; padding:15px; margin-bottom:10px; border-radius:12px;">
                <input type="text" placeholder="Year (e.g., 2021-2026)" value="${exp.year}" onchange="updateExp(${i}, 'year', this.value)">
                <input type="text" placeholder="Title" value="${exp.title}" onchange="updateExp(${i}, 'title', this.value)" style="margin-top:8px;">
                <input type="text" placeholder="Company" value="${exp.company}" onchange="updateExp(${i}, 'company', this.value)" style="margin-top:8px;">
                <textarea placeholder="Description" onchange="updateExp(${i}, 'desc', this.value)" style="margin-top:8px;">${exp.desc}</textarea>
                <button type="button" onclick="removeExp(${i})" style="background:#dc2626; margin-top:8px;">Remove</button>
            </div>
        `).join('');
    }
    
    function renderEducations() {
        const container = document.getElementById('eduContainer');
        container.innerHTML = educations.map((edu, i) => `
            <div style="border:1px solid #e2e8f0; padding:15px; margin-bottom:10px; border-radius:12px;">
                <input type="text" placeholder="Year" value="${edu.year}" onchange="updateEdu(${i}, 'year', this.value)">
                <input type="text" placeholder="Title" value="${edu.title}" onchange="updateEdu(${i}, 'title', this.value)" style="margin-top:8px;">
                <input type="text" placeholder="Percentage/Grade" value="${edu.percent}" onchange="updateEdu(${i}, 'percent', this.value)" style="margin-top:8px;">
                <button type="button" onclick="removeEdu(${i})" style="background:#dc2626; margin-top:8px;">Remove</button>
            </div>
        `).join('');
    }
    
    function updateExp(index, field, value) {
        experiences[index][field] = value;
    }
    
    function updateEdu(index, field, value) {
        educations[index][field] = value;
    }
    
    function addExperience() {
        experiences.push({ year: '2024', title: 'New Role', company: 'Company', desc: 'Description' });
        renderExperiences();
    }
    
    function addEducation() {
        educations.push({ year: '2024', title: 'New Degree', percent: 'Pending' });
        renderEducations();
    }
    
    function removeExp(index) {
        experiences.splice(index, 1);
        renderExperiences();
    }
    
    function removeEdu(index) {
        educations.splice(index, 1);
        renderEducations();
    }
    
    document.getElementById('editForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const skillsArray = document.getElementById('skills').value.split(',').map(s => s.trim());
        
        const data = {
            fullName: document.getElementById('fullName').value,
            designation: document.getElementById('designation').value,
            statusBadge: document.getElementById('statusBadge').value,
            about: document.getElementById('about').value,
            phone: document.getElementById('phone').value,
            email: document.getElementById('email').value,
            location: document.getElementById('location').value,
            birthday: document.getElementById('birthday').value,
            skills: skillsArray,
            experiences: experiences,
            educations: educations
        };
        
        await database.ref('cv_data').set(data);
        document.getElementById('successMsg').style.display = 'block';
        setTimeout(() => {
            document.getElementById('successMsg').style.display = 'none';
        }, 2000);
    });
    
    document.getElementById('logoutBtn').addEventListener('click', () => {
        localStorage.removeItem('cv_admin');
        window.location.href = 'index.html';
    });
    
    document.getElementById('resetBtn').addEventListener('click', loadData);
    
    loadData();
</script>
</body>
</html>
